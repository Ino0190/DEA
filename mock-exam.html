<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0f1420;--card:#1a2233;--card2:#222d44;--line:#2e3a52;--text:#e8edf5;--sub:#9fb0c8;--accent:#ff9900;--ok:#2ecc71;--ng:#e74c3c;--blue:#4a9eff}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,'Hiragino Kaku Gothic ProN','Yu Gothic',Meiryo,sans-serif;font-size:17px;line-height:1.7;-webkit-text-size-adjust:100%}
body{padding:0 0 90px;max-width:680px;margin:0 auto;min-height:100vh}
header{position:sticky;top:0;z-index:10;background:rgba(15,20,32,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:12px 16px}
.htop{display:flex;align-items:center;justify-content:space-between;gap:10px}
.htitle{font-size:16px;font-weight:700;color:var(--accent)}
.hstat{font-size:14px;color:var(--sub)}
.bar{height:6px;background:var(--card);border-radius:3px;margin-top:10px;overflow:hidden}
.bar>i{display:block;height:100%;background:var(--accent);width:0;transition:width .3s}
.screen{display:none;padding:18px 16px}
.screen.on{display:block}
.qmeta{display:flex;justify-content:space-between;font-size:13px;color:var(--sub);margin-bottom:10px}
.qcat{color:var(--blue);font-weight:700}
.qbody{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:16px;font-size:16px;line-height:1.8}
.qbody .ask{display:block;margin-top:12px;padding-top:12px;border-top:1px dashed var(--line);font-weight:700;font-size:17px;color:#fff}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{background:var(--card);border:2px solid var(--line);border-radius:12px;padding:14px 16px;font-size:16px;cursor:pointer;display:flex;gap:10px;align-items:flex-start;transition:.12s}
.opt:active{transform:scale(.99)}
.opt .lab{flex:0 0 24px;height:24px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--sub)}
.opt .ot{flex:1}
.opt.sel{border-color:var(--blue)}
.opt.correct{border-color:var(--ok);background:rgba(46,204,113,.12)}
.opt.correct .lab{background:var(--ok);color:#fff}
.opt.wrong{border-color:var(--ng);background:rgba(231,76,60,.12)}
.opt.wrong .lab{background:var(--ng);color:#fff}
.opt.disabled{cursor:default}
.multiHint{background:rgba(74,158,255,.12);border:1px solid var(--blue);color:var(--blue);border-radius:8px;padding:9px 13px;font-size:15px;font-weight:bold;margin-bottom:6px}
.btnrow{position:fixed;bottom:0;left:0;right:0;max-width:680px;margin:0 auto;padding:12px 16px calc(12px + env(safe-area-inset-bottom));background:rgba(15,20,32,.96);backdrop-filter:blur(8px);border-top:1px solid var(--line);display:flex;gap:10px}
.btn{flex:1;border:none;border-radius:12px;padding:15px;font-size:17px;font-weight:700;cursor:pointer;font-family:inherit}
.btn.primary{background:var(--accent);color:#1a1200}
.btn.ghost{background:var(--card2);color:var(--text);border:1px solid var(--line)}
.btn:disabled{opacity:.4}
.result{text-align:center;padding-top:30px}
.result .score{font-size:56px;font-weight:800;color:var(--accent)}
.result .smeta{color:var(--sub);font-size:16px;margin:6px 0 20px}
.result .msg{font-size:18px;margin-bottom:24px;line-height:1.6}
.result .domain{text-align:left;margin:0 auto;max-width:400px}
.result .drow{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:15px}
.result .drow .dlabel{color:var(--sub)}
.result .drow .dscore{font-weight:700}
.timer{font-size:14px;color:var(--sub);font-variant-numeric:tabular-nums}
.intro{text-align:center;padding:60px 20px}
.intro h1{font-size:22px;margin-bottom:12px}
.intro p{color:var(--sub);font-size:16px;line-height:1.7;margin-bottom:8px}
.intro .start{margin-top:28px;display:inline-block;background:var(--accent);color:#1a1200;font-size:18px;font-weight:700;padding:16px 40px;border-radius:14px;border:none;cursor:pointer;font-family:inherit}
.intro .back{margin-top:16px;display:inline-block;color:var(--sub);font-size:15px;text-decoration:underline;cursor:pointer}
.appnav{display:flex;gap:6px;max-width:680px;margin:0 auto;padding:8px 12px;background:var(--bg)}
.appnav .navbtn{flex:1;text-align:center;text-decoration:none;font-size:14px;font-weight:700;color:var(--sub);background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 4px}
.appnav .navbtn.active{color:#1a1200;background:var(--accent);border-color:var(--accent)}
/* 解説 */
.exp{margin-top:14px;background:var(--card2);border-radius:12px;padding:16px;font-size:15px;line-height:1.8}
.exp .verdict{font-size:16px;font-weight:700;margin-bottom:8px}
.exp .verdict.ok{color:var(--ok)}
.exp .verdict.ng{color:var(--ng)}
.exp .ansfull{background:rgba(46,204,113,.12);border:1px solid var(--ok);border-radius:10px;padding:11px 13px;margin-bottom:10px;font-size:14px;line-height:1.7}
.exp .ansfull .anslab{display:inline-block;background:var(--ok);color:#fff;font-weight:700;font-size:12px;border-radius:6px;padding:2px 8px;margin-right:7px}
.exp .h{color:var(--accent);font-weight:700;margin:10px 0 4px}
.exp .elim{font-size:14px;color:var(--sub);margin-top:8px}
/* チェックポイント */
.cp{padding:18px 16px}
.cp h2{font-size:20px;margin-bottom:6px}
.cp .cpmeta{color:var(--sub);font-size:15px;margin-bottom:18px}
.cp .cphint{color:var(--accent);font-size:14px;margin-bottom:14px}
/* 問題リスト（チェックポイント・結果共通） */
.qlist{margin-top:10px}
.qli{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden}
.qli .qhead{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer}
.qli .qbadge{flex:0 0 auto;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700}
.qli .qbadge.ok{background:var(--ok);color:#fff}
.qli .qbadge.ng{background:var(--ng);color:#fff}
.qli .qbadge.skip{background:var(--sub);color:#fff}
.qli .qnum{flex:0 0 auto;font-size:13px;color:var(--sub);font-weight:700}
.qli .qtt{flex:1;font-size:14px;color:var(--text);line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.qli .qchev{flex:0 0 auto;color:var(--sub);font-size:13px}
.qli .qdetail{display:none;padding:0 14px 14px;border-top:1px solid var(--line)}
.qli.open .qdetail{display:block}
.qli .qscenario{font-size:14px;color:var(--sub);line-height:1.7;margin:12px 0;padding:11px;background:var(--bg);border-radius:8px}
.qli .qscenario .ask{display:block;margin-top:8px;color:#fff;font-weight:700}
.qli .qopt{font-size:14px;padding:8px 11px;border-radius:8px;margin-bottom:6px;border:1px solid var(--line);line-height:1.6}
.qli .qopt.correct{border-color:var(--ok);background:rgba(46,204,113,.1)}
.qli .qopt.yourwrong{border-color:var(--ng);background:rgba(231,76,60,.1)}
.qli .qopt .ol{font-weight:700;margin-right:6px}
</style>
</head>

<section class="screen on" id="scIntro">
  <div class="intro">
    <h1>📝 SAA模試（本番形式）</h1>
    <p>全4バンク349問から本番と同じ配分で<b>65問</b>をランダム抽出</p>
    <p>制限時間 <b>130分</b>｜合格目安 <b>72%（47問）</b></p>
    <p style="font-size:14px;color:var(--sub);margin-top:12px">
      セキュア設計30%(20問) / 回復性26%(17問) / 高性能24%(15問) / コスト最適化20%(13問)
    </p>
    <p style="font-size:14px;color:var(--blue);margin-top:10px">
      📍 10問ごとに区切りチェック（正誤と解説を確認できる）<br>
      間違えた問題はドリルの「🔁間違えた問題だけ」に自動で入ります
    </p>
    <button class="start" onclick="startExam()">模試を開始する</button>
    <div class="back" onclick="location.href='index.html'">← ドリルに戻る</div>
  </div>
</section>

<section class="screen" id="scQuiz">
  <div class="qmeta"><span class="qcat" id="qCat"></span><span id="qIdx"></span></div>
  <div class="qbody" id="qBody"></div>
  <div class="opts" id="qOpts"></div>
</section>

<section class="screen" id="scResult"></section>

<section class="screen" id="scCheckpoint"></section>

<div class="btnrow" id="btnRow" style="display:none">
  <button class="btn ghost" id="btnFlag" onclick="flagQ()">🚩</button>
  <button class="btn primary" id="btnNext" disabled onclick="nextAction()">次へ</button>
</div>

<script>
// ===== 本番ドメインへのマッピング =====
const DOMAIN_MAP = {
  // 基本カテゴリ
  'セキュリティ': 'secure',
  'セキュリティ深掘り': 'secure',
  '運用・ガバナンス': 'secure',
  '運用・IaC': 'secure',
  'ネットワーク深掘り': 'secure',
  '可用性': 'resilient',
  'DR戦略': 'resilient',
  '高可用DR': 'resilient',
  'ストレージ': 'resilient',
  'ストレージ移行': 'resilient',
  'ストレージ深掘り': 'resilient',
  '目的別データベース': 'resilient',
  'データベース': 'resilient',
  '高性能': 'performance',
  'コンピュート・高性能': 'performance',
  'コンピュート・コンテナ': 'performance',
  '疎結合': 'performance',
  'アプリ統合・疎結合': 'performance',
  'サーバーレス': 'performance',
  '配信/CDN': 'performance',
  'データ分析': 'performance',
  'AI/ML': 'performance',
  'コスト最適化': 'cost',
  // 複合カテゴリ（バンクE等）
  '高可用・コスト': 'resilient',
  'セキュリティ・暗号化': 'secure',
  'ストレージ・移行': 'resilient',
  'コンピュート・購入戦略': 'cost',
  '配信・セキュリティ': 'secure',
  'IAM・ガバナンス': 'secure',
  'DB・読み取り最適化': 'performance',
  'セキュリティ・秘密管理': 'secure',
  '移行・大容量転送': 'resilient',
  'サーバーレス・API': 'performance',
  '可用性・DB': 'resilient',
  'ネットワーク・プライベート接続': 'secure',
  'WAF・DDoS防御': 'secure',
  'サーバーレス・イベント駆動': 'performance',
  'DR・フェイルオーバー': 'resilient',
  'データ分析・ETL': 'performance',
  '高可用・移行': 'resilient',
  'コスト最適化・EBS': 'cost',
  'IAM・クロスアカウント': 'secure',
  'ネットワーク・オンプレミス統合': 'secure',
  'コンテナ・移行': 'performance',
  'バックアップ・ランサム対策': 'resilient',
  'サーバーレス・大規模処理': 'performance',
  '移行・データベース': 'resilient',
  '監視・オブザーバビリティ': 'secure',
  'ストレージ・パフォーマンス': 'performance',
  'コスト管理・タグ戦略': 'cost',
  'データ保護・暗号化キー管理': 'secure',
  'API設計・スロットリング': 'performance',
  '高可用・グローバル配信': 'resilient',
  // V5追加 第1弾
  'ネットワーク・マルチVPC接続': 'secure',
  'ネットワーク・ハイブリッドDNS': 'secure',
  'ネットワーク・トラフィック検査': 'secure',
  'ネットワーク・DNSルーティング': 'secure',
  'ネットワーク・VPCエンドポイント': 'cost',
  'ネットワーク・AZ設計': 'resilient',
  'データ分析・アドホック分析': 'performance',
  'データ分析・ストリーミング取込': 'performance',
  'データ分析・ログ検索': 'performance',
  'データ分析・DWH拡張': 'performance',
  'データ分析・アクセス制御': 'secure',
  'データ分析・リアルタイム基盤': 'performance',
  // V5追加 第2弾
  'セキュリティ・ネットワーク制御': 'secure',
  'セキュリティ・限定共有': 'secure',
  'IAM・認証情報管理': 'secure',
  'セキュリティ・データ検出': 'secure',
  'セキュリティ・S3保護': 'secure',
  'ストレージ・共有ファイル': 'resilient',
  'ストレージ・アーカイブ': 'resilient',
  'バックアップ・PITR': 'resilient'
};

const DOMAINS = {
  secure:      {label:'セキュアなアーキテクチャ設計', target:19},
  resilient:   {label:'回復性の高いアーキテクチャ設計', target:16},
  performance: {label:'高性能アーキテクチャ設計', target:15},
  cost:        {label:'コスト最適化アーキテクチャ設計', target:15}
};

const FILES = ['questions.js','questions_v2.js','questions_v3.js','questions_v4.js','questions_v5.js'];
let ALL_Q = [];
let exam = {list:[], idx:0, answers:{}, flagged:{}, startTime:null, timerInterval:null};

// 全バンク読み込み
async function loadAll(){
  for(const f of FILES){
    try{
      const txt = await (await fetch(f)).text();
      // eval in function scope to capture QUESTIONS
      const fn = new Function(txt + '; return QUESTIONS;');
      const qs = fn();
      // tag with source file
      qs.forEach(q => { q._src = f; });
      ALL_Q = ALL_Q.concat(qs);
    }catch(e){ console.warn('Failed to load '+f, e); }
  }
}

function pickQuestions(){
  // Group by domain
  const pools = {secure:[], resilient:[], performance:[], cost:[]};
  ALL_Q.forEach(q => {
    const d = DOMAIN_MAP[q.cat];
    if(d) pools[d].push(q);
    else pools.performance.push(q); // fallback
  });
  // Shuffle each pool
  Object.values(pools).forEach(arr => arr.sort(() => Math.random() - 0.5));
  // Pick target count from each
  let picked = [];
  for(const [key, info] of Object.entries(DOMAINS)){
    const pool = pools[key];
    picked = picked.concat(pool.slice(0, info.target));
  }
  // If any domain is short, fill from largest pools
  if(picked.length < 65){
    const used = new Set(picked.map(q => q._src+':'+q.id));
    const remaining = ALL_Q.filter(q => !used.has(q._src+':'+q.id));
    remaining.sort(() => Math.random() - 0.5);
    while(picked.length < 65 && remaining.length){
      picked.push(remaining.shift());
    }
  }
  // Final shuffle
  picked.sort(() => Math.random() - 0.5);
  return picked;
}

function startExam(){
  exam.list = pickQuestions();
  exam.idx = 0;
  exam.answers = {};
  exam.flagged = {};
  exam.startTime = Date.now();
  document.getElementById('scIntro').classList.remove('on');
  document.getElementById('scQuiz').classList.add('on');
  document.getElementById('btnRow').style.display = 'flex';
  startTimer();
  renderQ();
}

function startTimer(){
  updateTimer();
  exam.timerInterval = setInterval(updateTimer, 1000);
}
function updateTimer(){
  const elapsed = Math.floor((Date.now() - exam.startTime) / 1000);
  const remain = Math.max(0, 130*60 - elapsed);
  const m = Math.floor(remain/60);
  const s = remain%60;
  document.getElementById('timer').textContent = `残り ${m}:${String(s).padStart(2,'0')}`;
  if(remain <= 0){ clearInterval(exam.timerInterval); finishExam(); }
}

function isMulti(q){ return Array.isArray(q.answer); }
function ansArr(q){ return isMulti(q) ? q.answer.slice().sort((a,b)=>a-b) : [q.answer]; }
function isCorrect(q, ans){
  if(ans === undefined) return false;
  if(isMulti(q)){
    const ca = ansArr(q);
    const sa = (Array.isArray(ans) ? ans.slice().sort((a,b)=>a-b) : []);
    return JSON.stringify(ca) === JSON.stringify(sa);
  }
  return ans === q.answer;
}
function esc(s){ return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

// 解説HTML（問題リストの展開部）
function detailHTML(q, gi){
  const ans = exam.answers[gi];
  const ca = ansArr(q);
  const yourArr = ans === undefined ? [] : (Array.isArray(ans) ? ans : [ans]);
  let opts = '';
  q.options.forEach((o,i) => {
    let cls = '';
    if(ca.includes(i)) cls = 'correct';
    else if(yourArr.includes(i)) cls = 'yourwrong';
    opts += `<div class="qopt ${cls}"><span class="ol">${'ABCDE'[i]}</span>${esc(o)}${ca.includes(i)?' ✓':''}${(!ca.includes(i)&&yourArr.includes(i))?' ←あなたの回答':''}</div>`;
  });
  let html = `<div class="qdetail">
    <div class="qscenario">${q.scenario}<span class="ask">${q.ask}</span></div>
    ${opts}`;
  if(q.keypoint) html += `<div class="exp" style="margin-top:12px"><div class="h">🎯 本当に聞かれていること</div>${q.keypoint}`;
  else html += `<div class="exp" style="margin-top:12px">`;
  if(q.explain) html += `<div class="h">💡 なぜこれが正解か</div>${q.explain}`;
  if(q.elim) html += `<div class="elim">❌ ${q.elim}</div>`;
  html += `</div></div>`;
  return html;
}

// 問題リスト（範囲指定）
function qlistHTML(fromIdx, toIdx){
  let html = '<div class="qlist">';
  for(let i = fromIdx; i <= toIdx; i++){
    const q = exam.list[i];
    const ans = exam.answers[i];
    let badge, bcls;
    if(ans === undefined){ badge = '—'; bcls = 'skip'; }
    else if(isCorrect(q, ans)){ badge = '○'; bcls = 'ok'; }
    else { badge = '×'; bcls = 'ng'; }
    html += `<div class="qli" data-gi="${i}">
      <div class="qhead" onclick="toggleQli(${i})">
        <span class="qbadge ${bcls}">${badge}</span>
        <span class="qnum">Q${i+1}</span>
        <span class="qtt">${esc(q.ask)}</span>
        <span class="qchev">解説 ▼</span>
      </div>
      ${detailHTML(q, i)}
    </div>`;
  }
  html += '</div>';
  return html;
}
function toggleQli(gi){
  const el = document.querySelector(`.qli[data-gi="${gi}"]`);
  if(el) el.classList.toggle('open');
}

// 復習プールへ書き込み（バンク別）＝模試の正解・間違い両方を進捗に反映
const SRC_TO_BANK = {'questions.js':'main','questions_v2.js':'v2','questions_v3.js':'v3','questions_v4.js':'v4','questions_v5.js':'v5'};
function saveWrongToReview(){
  const byBank = {};
  exam.list.forEach((q,i) => {
    const bank = SRC_TO_BANK[q._src] || 'main';
    (byBank[bank] = byBank[bank] || []).push({id:q.id, ok:isCorrect(q, exam.answers[i])});
  });
  for(const [bank, items] of Object.entries(byBank)){
    const key = 'dea_drill_progress_v1_' + bank;
    let prog;
    try{ prog = JSON.parse(localStorage.getItem(key)) || {}; }catch(e){ prog = {}; }
    prog.seen = prog.seen || {}; prog.wrong = prog.wrong || {};
    prog.wrongCount = prog.wrongCount || {}; prog.correctCount = prog.correctCount || {};
    prog.unsure = prog.unsure || {};
    items.forEach(({id, ok}) => {
      prog.seen[id] = true;
      if(ok){
        // 模試で正解→学習済み・正答として記録し、間違いプールから外す
        // ※ドリルで本人が付けた「自信なし(unsure)」は尊重して残す
        prog.correctCount[id] = (prog.correctCount[id] || 0) + 1;
        delete prog.wrong[id];
      } else {
        // 模試で間違い→間違いプールに入れる
        prog.wrong[id] = true;
        prog.wrongCount[id] = (prog.wrongCount[id] || 0) + 1;
      }
    });
    localStorage.setItem(key, JSON.stringify(prog));
  }
}

function renderQ(){
  const q = exam.list[exam.idx];
  document.getElementById('qCat').textContent = q.cat;
  document.getElementById('qIdx').textContent = `${exam.idx+1} / 65`;
  let multiHint = '';
  if(isMulti(q)){ multiHint = `<div class="multiHint">✓ ${ansArr(q).length}つ選んでください（複数選択）</div>`; }
  document.getElementById('qBody').innerHTML = multiHint + q.scenario + '<span class="ask">' + q.ask + '</span>';
  const opts = document.getElementById('qOpts'); opts.innerHTML = '';
  const prev = exam.answers[exam.idx];
  q.options.forEach((o,i) => {
    const d = document.createElement('div'); d.className = 'opt'; d.dataset.i = i;
    d.innerHTML = `<span class="lab">${'ABCDE'[i]}</span><span class="ot">${o}</span>`;
    if(prev !== undefined){
      if(Array.isArray(prev) && prev.includes(i)) d.classList.add('sel');
      else if(prev === i) d.classList.add('sel');
    }
    d.onclick = () => selectOpt(i);
    opts.appendChild(d);
  });
  document.getElementById('btnNext').textContent = exam.idx < 64 ? '次へ' : '提出する';
  document.getElementById('btnNext').disabled = (exam.answers[exam.idx] === undefined);
  document.getElementById('btnFlag').textContent = exam.flagged[exam.idx] ? '🚩済' : '🚩';
  document.getElementById('hBar').style.width = ((exam.idx+1)/65*100)+'%';
  document.getElementById('hStat').textContent = `${exam.idx+1}/65`;
  window.scrollTo(0,0);
}

function selectOpt(i){
  const q = exam.list[exam.idx];
  if(isMulti(q)){
    let sel = exam.answers[exam.idx] || [];
    if(!Array.isArray(sel)) sel = [];
    const idx = sel.indexOf(i);
    if(idx >= 0) sel.splice(idx, 1);
    else if(sel.length < ansArr(q).length) sel.push(i);
    else return;
    exam.answers[exam.idx] = sel.length ? sel : undefined;
  } else {
    exam.answers[exam.idx] = i;
  }
  // Update UI
  document.querySelectorAll('#qOpts .opt').forEach(el => {
    const oi = +el.dataset.i;
    const ans = exam.answers[exam.idx];
    if(Array.isArray(ans)) el.classList.toggle('sel', ans.includes(oi));
    else el.classList.toggle('sel', oi === ans);
  });
  document.getElementById('btnNext').disabled = (exam.answers[exam.idx] === undefined);
}

function flagQ(){
  exam.flagged[exam.idx] = !exam.flagged[exam.idx];
  document.getElementById('btnFlag').textContent = exam.flagged[exam.idx] ? '🚩済' : '🚩';
}

function nextAction(){
  // 10問ごと（10,20,...,60問目の直後）にチェックポイント。最終問は提出。
  if(exam.idx < 64 && (exam.idx + 1) % 10 === 0){
    showCheckpoint();
    return;
  }
  if(exam.idx < 64){
    exam.idx++;
    renderQ();
  } else {
    if(confirm('模試を提出しますか？')) finishExam();
  }
}

function showCheckpoint(){
  const blockEnd = exam.idx;            // 0-indexed, 直近ブロックの最終問
  const blockStart = blockEnd - 9;      // 直近10問
  // そこまでの累計正解
  let totalCorrect = 0;
  for(let i = 0; i <= blockEnd; i++){ if(isCorrect(exam.list[i], exam.answers[i])) totalCorrect++; }
  let blockCorrect = 0;
  for(let i = blockStart; i <= blockEnd; i++){ if(isCorrect(exam.list[i], exam.answers[i])) blockCorrect++; }
  const done = blockEnd + 1;
  const html = `<div class="cp">
    <h2>📍 ${done}問終了｜区切りチェック</h2>
    <div class="cpmeta">この10問：<b style="color:var(--accent)">${blockCorrect}/10</b>　／　ここまで累計：<b style="color:var(--accent)">${totalCorrect}/${done}</b>（${Math.round(totalCorrect/done*100)}%）</div>
    <div class="cphint">各問をタップすると正誤と解説が開きます。確認したら下のボタンで次へ。</div>
    ${qlistHTML(blockStart, blockEnd)}
    <button class="start" style="margin-top:20px;width:100%" onclick="continueExam()">次の${done<60?'10':'5'}問へ進む（残り${64-blockEnd}問）</button>
    <div class="back" style="margin-top:14px" onclick="if(confirm('ここで模試を切り上げて結果を見ますか？'))finishExam()">ここで切り上げて結果を見る</div>
  </div>`;
  document.getElementById('scQuiz').classList.remove('on');
  document.getElementById('btnRow').style.display = 'none';
  const sc = document.getElementById('scCheckpoint'); sc.innerHTML = html; sc.classList.add('on');
  window.scrollTo(0,0);
}

function continueExam(){
  document.getElementById('scCheckpoint').classList.remove('on');
  document.getElementById('scQuiz').classList.add('on');
  document.getElementById('btnRow').style.display = 'flex';
  exam.idx++;
  renderQ();
}

function finishExam(){
  clearInterval(exam.timerInterval);
  saveWrongToReview();
  const elapsed = Math.floor((Date.now() - exam.startTime) / 1000);
  const elM = Math.floor(elapsed/60); const elS = elapsed%60;
  // Score
  let correct = 0;
  const domainScore = {secure:{c:0,t:0}, resilient:{c:0,t:0}, performance:{c:0,t:0}, cost:{c:0,t:0}};
  exam.list.forEach((q,i) => {
    const d = DOMAIN_MAP[q.cat] || 'performance';
    domainScore[d].t++;
    if(isCorrect(q, exam.answers[i])){ correct++; domainScore[d].c++; }
  });
  const pct = Math.round(correct/65*100);
  const pass = pct >= 72;
  let html = `<div class="result">
    <div class="score">${pct}%</div>
    <div class="smeta">${correct}/65問正解　所要${elM}分${elS}秒</div>
    <div class="msg">${pass ? '🎉 合格ライン突破！' : '😤 あと少し。間違えた問題をドリルで復習しよう。'}</div>
    <div class="domain">`;
  for(const [key, info] of Object.entries(DOMAINS)){
    const ds = domainScore[key];
    const dp = ds.t ? Math.round(ds.c/ds.t*100) : 0;
    html += `<div class="drow"><span class="dlabel">${info.label}</span><span class="dscore">${ds.c}/${ds.t} (${dp}%)</span></div>`;
  }
  html += `</div>
    <p style="color:var(--sub);font-size:14px;margin-top:16px">間違えた問題は<b style="color:var(--accent)">ドリルの「🔁間違えた問題だけ」</b>に追加しました。</p>
    <button class="start" style="margin-top:20px" onclick="location.reload()">もう一度</button>
    <div class="back" style="margin-top:14px" onclick="location.href='index.html'">← ドリルに戻る</div>
    <h2 style="text-align:left;font-size:18px;margin:30px 0 4px">全65問の振り返り</h2>
    <p style="text-align:left;color:var(--sub);font-size:14px;margin-bottom:8px">○×をタップで解説。間違えた問題から見直そう。</p>
    ${qlistHTML(0, 64)}
  </div>`;
  document.getElementById('scQuiz').classList.remove('on');
  document.getElementById('scCheckpoint').classList.remove('on');
  document.getElementById('btnRow').style.display = 'none';
  const sc = document.getElementById('scResult'); sc.innerHTML = html; sc.classList.add('on');
  window.scrollTo(0,0);
}

// 起動
loadAll().then(() => {
  document.getElementById('scIntro').querySelector('.start').disabled = false;
}).catch(e => {
  document.body.innerHTML = '<p style="padding:20px;font-size:16px">問題ファイルを読み込めませんでした。python3 -m http.server 経由で開いてください。</p>';
});
</script>

</html>
